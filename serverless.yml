service: users-api

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-southeast-2
  stage: dev

  httpApi:
    cors:
      allowedOrigins:
        - '*'
      allowedHeaders:
        - '*'
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE

functions:
  app:
    handler: server.handler
    events:
      - httpApi:
          path: /
          method: ANY
      - httpApi:
          path: /{proxy+}
          method: ANY